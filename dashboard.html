<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>
<body>
    <header class="main-header">
        <h1>📊 Election Analytics</h1>
        <nav>
            <button class="btn-primary" onclick="openDashboard()">View Live Poll</button>
            <a href="index.html" class="btn-secondary">Logout</a>
        </nav>
    </header>
    <main id="dashboard" class="container" style="display:none;">
        <section class="card-section">
            <h2>Candidates</h2>
            <div class="candidates-grid">
                <article class="candidate-card">
                    <h3>Sarah Duterte</h3>
                    <button onclick="vote('sarah','online')">Online</button>
                    <button onclick="vote('sarah','f2f')">F2F</button>
                </article>
                <article class="candidate-card">
                    <h3>Vico Sotto</h3>
                    <button onclick="vote('vico','online')">Online</button>
                    <button onclick="vote('vico','f2f')">F2F</button>
                </article>
                <article class="candidate-card">
                    <h3>Leni Robredo</h3>
                    <button onclick="vote('leni','online')">Online</button>
                    <button onclick="vote('leni','f2f')">F2F</button>
                </article>
            </div>
        </section>
        <section class="analytics-grid">
            <div class="chart-container card">
                <canvas id="chart"></canvas>
            </div>
            <div class="stats-footer card">
                <div id="prediction">Waiting for data...</div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
