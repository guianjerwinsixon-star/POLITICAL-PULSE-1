<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Political Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <section class="login-card">
            <h1 style="color:#00f2ff; text-align: center;">Political Pulse v2.0</h1>
            <div style="margin-bottom: 20px; text-align: center;">
                <button type="button" onclick="showTab('voter')">Voter Gateway</button>
                <button type="button" onclick="showTab('admin')" style="background:#30305a; color:white;">Admin Portal</button>
            </div>
            <form id="voterForm">
                <p>Identity Verification: Enter Gmail to continue.</p>
                <input type="email" id="voterEmail" placeholder="username@gmail.com" required>
                <button type="submit" style="width:100%">Verify & Enter</button>
            </form>
            <form id="adminForm" style="display:none;">
                <p>System Administrator Authentication</p>
                <input type="text" id="adminUser" placeholder="Username" required>
                <input type="password" id="adminPass" placeholder="Password" required>
                <button type="submit" style="width:100%; background:#ff4d4d; color:white;">Authenticate</button>
            </form>
            <div id="message" style="margin-top:20px; color:#ff4d4d; font-weight:bold; text-align: center;"></div>
        </section>
    </div>
    <script src="admin.js"></script>
</body>
</html>
