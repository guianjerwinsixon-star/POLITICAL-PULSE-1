<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Political Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-container">
        <section class="login-card">
            <h1>Political Pulse</h1>
            <div class="login-toggle">
                <button onclick="showTab('voter')">Voter Login</button>
                <button onclick="showTab('admin')">Admin Login</button>
            </div>
            <form id="voterForm" class="login-tab">
                <input type="email" id="voterEmail" placeholder="Your @gmail.com" required>
                <button type="submit">Enter to Vote</button>
            </form>
            <form id="adminForm" class="login-tab" style="display:none;">
                <input type="text" id="adminUser" placeholder="Username">
                <input type="password" id="adminPass" placeholder="Password">
                <button type="submit">Login as Admin</button>
            </form>
            <div id="message" style="margin-top:15px; color: #ff4d4d; font-weight: bold;"></div>
        </section>
    </main>
    <script src="admin.js"></script>
</body>
</html>
