<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Political Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-container">
        <section class="login-card">
            <h1>Political Pulse</h1>
            <div class="login-toggle">
                <button type="button" onclick="showTab('voter')">Voter Login</button>
                <button type="button" onclick="showTab('admin')">Admin Login</button>
            </div>
            <form id="voterForm">
                <p>Login with Gmail to access the ballot.</p>
                <input type="email" id="voterEmail" placeholder="user@gmail.com" required>
                <button type="submit">Enter Dashboard</button>
            </form>
            <form id="adminForm" style="display:none;">
                <p>Authorized Personnel Only</p>
                <input type="text" id="adminUser" placeholder="Username">
                <input type="password" id="adminPass" placeholder="Password">
                <button type="submit">Login as Admin</button>
            </form>
            <div id="message" style="margin-top:15px; color: #ff4d4d;"></div>
        </section>
    </main>
    <script src="admin.js"></script>
</body>
</html>
