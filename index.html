<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Political Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <section class="login-card">
            <h1>Political Pulse</h1>
            <div style="margin-bottom: 20px;">
                <button type="button" onclick="showTab('voter')">Voter</button>
                <button type="button" onclick="showTab('admin')" style="background:#30305a; color:white;">Admin</button>
            </div>
            <form id="voterForm">
                <input type="email" id="voterEmail" placeholder="username@gmail.com" required>
                <button type="submit" style="width:100%">Enter Dashboard</button>
            </form>
            <form id="adminForm" style="display:none;">
                <input type="text" id="adminUser" placeholder="Username" required>
                <input type="password" id="adminPass" placeholder="Password" required>
                <button type="submit" style="width:100%; background:#ff4d4d; color:white;">Login Admin</button>
            </form>
            <div id="message" style="margin-top:20px; color:#ff4d4d;"></div>
        </section>
    </div>
    <script src="admin.js"></script>
</body>
</html>
