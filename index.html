<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Political Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-container">
        <section class="login-card">
            <h1>Political Pulse</h1>
            <div class="login-toggle">
                <button type="button" onclick="showTab('voter')">Voter</button>
                <button type="button" onclick="showTab('admin')">Admin</button>
            </div>
            <form id="voterForm">
                <p>Login with Gmail to vote</p>
                <input type="email" id="voterEmail" placeholder="user@gmail.com" required>
                <button type="submit">Enter Dashboard</button>
            </form>
            <form id="adminForm" style="display:none;">
                <p>Internal Access Only</p>
                <input type="text" id="adminUser" placeholder="Username">
                <input type="password" id="adminPass" placeholder="Password">
                <button type="submit">Login as Admin</button>
            </form>
            <div id="message"></div>
        </section>
    </main>
    <script src="admin.js"></script>
</body>
</html>

DASHBOARD.HTML
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Political Pulse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="main-header">
        <h1>📊 Election Analytics</h1>
        <nav>
            <button onclick="openDashboard()">View Live Poll</button>
            <a href="index.html" class="btn-secondary">Logout</a>
        </nav>
    </header>

    <main id="dashboard" style="display:none;">
        <section class="candidates-grid">
            <article class="candidate-card">
                <h3>Sarah Duterte</h3>
                <button onclick="vote('sarah')">Vote</button>
            </article>
            <article class="candidate-card">
                <h3>Vico Sotto</h3>
                <button onclick="vote('vico')">Vote</button>
            </article>
            <article class="candidate-card">
                <h3>Leni Robredo</h3>
                <button onclick="vote('leni')">Vote</button>
            </article>
        </section>

        <section class="chart-container card">
            <canvas id="chart"></canvas>
            <div id="prediction" style="margin-top:20px; font-size: 1.2rem;"></div>
        </section>

        <section id="adminControls" style="display:none; margin-top: 50px; border-top: 1px solid #ff4d4d; padding-top: 20px;">
            <h2 style="color: #ff4d4d;">Admin Controls</h2>
            <button onclick="resetPoll()" style="background: #ff4d4d; color: white;">RESET ALL DATA</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
